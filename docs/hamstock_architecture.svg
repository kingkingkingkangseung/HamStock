<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15110C"/>
      <stop offset="0.48" stop-color="#2C1A0D"/>
      <stop offset="1" stop-color="#0E0B08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE9A8"/>
      <stop offset="0.45" stop-color="#D49A25"/>
      <stop offset="1" stop-color="#8A5A12"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF1C8"/>
      <stop offset="1" stop-color="#E0B96F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DCA83A"/>
    </marker>
    <style>
      .title { font-family: Apple SD Gothic Neo, Pretendard, Arial, sans-serif; font-size: 54px; font-weight: 900; fill: #FFE8A5; letter-spacing: -1px; }
      .subtitle { font-family: Apple SD Gothic Neo, Pretendard, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #D9C197; }
      .box-title { font-family: Apple SD Gothic Neo, Pretendard, Arial, sans-serif; font-size: 30px; font-weight: 900; fill: #2A1B0D; }
      .box-sub { font-family: Apple SD Gothic Neo, Pretendard, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #5B4221; }
      .small { font-family: Apple SD Gothic Neo, Pretendard, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #6A4A1C; }
      .dark-title { font-family: Apple SD Gothic Neo, Pretendard, Arial, sans-serif; font-size: 28px; font-weight: 900; fill: #FFEBC0; }
      .dark-sub { font-family: Apple SD Gothic Neo, Pretendard, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #D6C2A0; }
      .label { font-family: Apple SD Gothic Neo, Pretendard, Arial, sans-serif; font-size: 18px; font-weight: 900; fill: #FFE8A5; }
      .arrow-text { font-family: Apple SD Gothic Neo, Pretendard, Arial, sans-serif; font-size: 17px; font-weight: 800; fill: #F2C96B; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="455" r="360" fill="#F0B33B" opacity="0.08"/>
  <circle cx="800" cy="455" r="245" fill="#F0B33B" opacity="0.07"/>

  <text x="800" y="72" text-anchor="middle" class="title">HamStock 시스템 구조</text>
  <text x="800" y="112" text-anchor="middle" class="subtitle">자산 동기화 성장형 아바타 기반 모의투자 플랫폼</text>

  <!-- Flutter App -->
  <g filter="url(#shadow)">
    <rect x="70" y="210" width="315" height="430" rx="34" fill="url(#panel)" stroke="url(#gold)" stroke-width="5"/>
    <text x="227" y="270" text-anchor="middle" class="box-title">Flutter App</text>
    <text x="227" y="306" text-anchor="middle" class="box-sub">Mobile Client</text>
    <rect x="105" y="345" width="245" height="62" rx="18" fill="#FFF8DF" stroke="#C28A24" stroke-width="2"/>
    <text x="227" y="384" text-anchor="middle" class="small">홈 / 아바타 화면</text>
    <rect x="105" y="423" width="245" height="62" rx="18" fill="#FFF8DF" stroke="#C28A24" stroke-width="2"/>
    <text x="227" y="462" text-anchor="middle" class="small">투자 / 종목 상세</text>
    <rect x="105" y="501" width="245" height="62" rx="18" fill="#FFF8DF" stroke="#C28A24" stroke-width="2"/>
    <text x="227" y="540" text-anchor="middle" class="small">퀴즈 / 랭킹 / 내역</text>
    <text x="227" y="600" text-anchor="middle" class="small">REST API 호출</text>
  </g>

  <!-- NestJS Server -->
  <g filter="url(#shadow)">
    <rect x="505" y="165" width="590" height="520" rx="38" fill="#23170E" stroke="url(#gold)" stroke-width="5"/>
    <text x="800" y="225" text-anchor="middle" class="dark-title">NestJS Server</text>
    <text x="800" y="260" text-anchor="middle" class="dark-sub">비즈니스 로직 처리 및 API 제공</text>

    <rect x="545" y="305" width="245" height="92" rx="20" fill="#FFF1C8" stroke="#DCA83A" stroke-width="3"/>
    <text x="668" y="342" text-anchor="middle" class="box-sub">AuthModule</text>
    <text x="668" y="372" text-anchor="middle" class="small">회원가입 / 로그인</text>

    <rect x="810" y="305" width="245" height="92" rx="20" fill="#FFF1C8" stroke="#DCA83A" stroke-width="3"/>
    <text x="933" y="342" text-anchor="middle" class="box-sub">StockModule</text>
    <text x="933" y="372" text-anchor="middle" class="small">종목 / 검색 / 차트</text>

    <rect x="545" y="420" width="245" height="92" rx="20" fill="#FFF1C8" stroke="#DCA83A" stroke-width="3"/>
    <text x="668" y="457" text-anchor="middle" class="box-sub">OrderModule</text>
    <text x="668" y="487" text-anchor="middle" class="small">미리보기 / 매수 / 매도</text>

    <rect x="810" y="420" width="245" height="92" rx="20" fill="#FFF1C8" stroke="#DCA83A" stroke-width="3"/>
    <text x="933" y="457" text-anchor="middle" class="box-sub">MeModule</text>
    <text x="933" y="487" text-anchor="middle" class="small">대시보드 / 랭킹</text>

    <rect x="545" y="535" width="245" height="92" rx="20" fill="#FFF1C8" stroke="#DCA83A" stroke-width="3"/>
    <text x="668" y="572" text-anchor="middle" class="box-sub">QuizModule</text>
    <text x="668" y="602" text-anchor="middle" class="small">OX퀴즈 / 씨앗 환전</text>

    <rect x="810" y="535" width="245" height="92" rx="20" fill="#FFF1C8" stroke="#DCA83A" stroke-width="3"/>
    <text x="933" y="572" text-anchor="middle" class="box-sub">Scheduler</text>
    <text x="933" y="602" text-anchor="middle" class="small">시세 주기 업데이트</text>
  </g>

  <!-- Prisma -->
  <g filter="url(#shadow)">
    <rect x="1190" y="225" width="300" height="155" rx="30" fill="#FFF1C8" stroke="url(#gold)" stroke-width="5"/>
    <text x="1340" y="290" text-anchor="middle" class="box-title">Prisma ORM</text>
    <text x="1340" y="330" text-anchor="middle" class="box-sub">TypeScript ↔ DB 매핑</text>
  </g>

  <!-- PostgreSQL -->
  <g filter="url(#shadow)">
    <rect x="1190" y="485" width="300" height="210" rx="30" fill="#FFF1C8" stroke="url(#gold)" stroke-width="5"/>
    <text x="1340" y="545" text-anchor="middle" class="box-title">PostgreSQL</text>
    <text x="1340" y="585" text-anchor="middle" class="box-sub">User / Asset / Stock</text>
    <text x="1340" y="618" text-anchor="middle" class="box-sub">Portfolio / Order</text>
    <text x="1340" y="651" text-anchor="middle" class="box-sub">WatchUniverse / Quiz</text>
  </g>

  <!-- Yahoo -->
  <g filter="url(#shadow)">
    <rect x="590" y="745" width="420" height="90" rx="28" fill="#17350F" stroke="#60B044" stroke-width="4"/>
    <text x="800" y="787" text-anchor="middle" class="dark-title">Yahoo Finance API</text>
    <text x="800" y="817" text-anchor="middle" class="dark-sub">국내/미국 주식 시세 및 차트 데이터</text>
  </g>

  <!-- Arrows -->
  <line x1="385" y1="425" x2="505" y2="425" stroke="#DCA83A" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="445" y="395" text-anchor="middle" class="arrow-text">REST</text>

  <line x1="1095" y1="350" x2="1190" y2="303" stroke="#DCA83A" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1152" y="307" text-anchor="middle" class="arrow-text">ORM</text>

  <line x1="1340" y1="380" x2="1340" y2="485" stroke="#DCA83A" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1390" y="440" class="arrow-text">Query</text>

  <line x1="800" y1="745" x2="920" y2="685" stroke="#6DD05F" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="900" y="720" class="arrow-text">시세 수집</text>

  <line x1="1190" y1="590" x2="1095" y2="590" stroke="#DCA83A" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1145" y="628" text-anchor="middle" class="arrow-text">저장/조회</text>

  <rect x="120" y="735" width="360" height="92" rx="28" fill="#2B2017" stroke="#8A5A12" stroke-width="3"/>
  <text x="300" y="774" text-anchor="middle" class="label">사용자 흐름</text>
  <text x="300" y="805" text-anchor="middle" class="dark-sub">앱 조작 → 서버 처리 → DB 반영 → 화면 갱신</text>
</svg>
